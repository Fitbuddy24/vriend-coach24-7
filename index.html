<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voorraad Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header>
        <h1>Voorraad Dashboard</h1>
        <div class="controls">
            <input
                type="text"
                id="searchInput"
                placeholder="Zoek op artikelnummer of omschrijving…"
            />
            <label>
                <input type="checkbox" id="filterStock" />
                Alleen op voorraad
            </label>
        </div>
    </header>

    <main>
        <section id="inventorySection">
            <table id="inventoryTable">
                <thead>
                    <tr>
                        <th>Artikelnummer</th>
                        <th>Omschrijving</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="reorderSection">
            <h2>Te herbestellen items</h2>
            <ul id="reorderList"></ul>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
